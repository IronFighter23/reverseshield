name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  js:
    name: JS — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Test
        run: npm run test --workspaces --if-present
  rust:
    name: Rust — fmt, clippy, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
  php:
    name: PHP — WordPress smoke + Laravel PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2
      - name: WordPress plugin — CLI smoke test
        run: php packages/middleware-wordpress/test/plugin-test.php
      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: packages/middleware-laravel/vendor
          key: composer-${{ hashFiles('packages/middleware-laravel/composer.json') }}
          restore-keys: |
            composer-
      - name: Laravel package — composer install
        working-directory: packages/middleware-laravel
        run: composer install --no-progress --no-interaction --prefer-dist
      - name: Laravel package — PHPUnit
        working-directory: packages/middleware-laravel
        run: vendor/bin/phpunit --colors=always
