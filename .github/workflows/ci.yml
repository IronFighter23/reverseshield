name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  js:
    name: JS — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Test
        run: npm run test --workspaces --if-present
  rust:
    name: Rust — fmt, clippy, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
  wasm:
    # Builds the reverseshield-core crate to WebAssembly and confirms the artifact lands.
    # Independent of the `rust` job — parallelism, and either job failing surfaces its own
    # error without waiting on the other. See packages/core/build-wasm.sh for details.
    name: WASM — build + size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key from the `rust` job — WASM builds use a different target
          # dir and different installed CLI (wasm-bindgen-cli), so a shared cache would
          # just churn.
          key: wasm
      - name: Build WASM
        run: bash packages/core/build-wasm.sh
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v5
        with:
          name: reverseshield-core-wasm
          path: packages/core/pkg/
          if-no-files-found: error
          retention-days: 7
  php:
    name: PHP — WordPress smoke + Laravel PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2
      - name: WordPress plugin — CLI smoke test
        run: php packages/middleware-wordpress/test/plugin-test.php
      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: packages/middleware-laravel/vendor
          key: composer-${{ hashFiles('packages/middleware-laravel/composer.json') }}
          restore-keys: |
            composer-
      - name: Laravel package — composer install
        working-directory: packages/middleware-laravel
        run: composer install --no-progress --no-interaction --prefer-dist
      - name: Laravel package — PHPUnit
        working-directory: packages/middleware-laravel
        run: vendor/bin/phpunit --colors=always
