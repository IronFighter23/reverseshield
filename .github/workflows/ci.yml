name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  js:
    # Builds and tests the browser agent and reporting service. The agent-js package
    # depends on the compiled WASM binary (real, not the stub) for its integration
    # tests and for its final bundle. Rather than serialize this job behind the `wasm`
    # job via `needs`, we build WASM inline here. Yes, that's duplicated work versus
    # the `wasm` job below — but Swatinem's cargo cache absorbs the compile cost
    # within seconds, and independent jobs surface their own failures faster.
    name: JS — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key from the `wasm` job — same crate, different target dir
          # in practice (this job also runs native cargo through JS deps that pull
          # rust things transitively for tooling like esbuild's native binary).
          key: js
      - name: Build WASM (real binary needed by scoring.wasm.test.ts and the final bundle)
        run: bash packages/core/build-wasm.sh
      - name: Install
        run: npm install
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Test
        run: npm run test --workspaces --if-present
      - name: Build agent-js
        run: npm run build --workspace=packages/agent-js
      - name: Bundle size check (dist/index.js gzipped <= 12 KB)
        run: |
          set -euo pipefail
          BUDGET=12288
          FILE=packages/agent-js/dist/index.js
          GZ=$(gzip -9 -c "$FILE" | wc -c | tr -d ' ')
          RAW=$(stat -c%s "$FILE")
          echo "::notice file=$FILE::agent-js bundle: raw=$RAW B, gzipped=$GZ B (budget=$BUDGET B gzipped)"
          if [ "$GZ" -gt "$BUDGET" ]; then
            echo "::error file=$FILE::gzipped $GZ B exceeds bundle budget of $BUDGET B"
            exit 1
          fi
  rust:
    name: Rust — fmt, clippy, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
  wasm:
    # Builds the reverseshield-core crate to WebAssembly and publishes the artifact.
    # Runs in parallel with the `js` job — both duplicate the WASM compile, but Swatinem
    # caching keeps that near-free on the second build. The published artifact here is
    # what external consumers (the reporting service, CDN uploads) download.
    name: WASM — build + size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm
      - name: Build WASM
        run: bash packages/core/build-wasm.sh
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: reverseshield-core-wasm
          path: packages/core/pkg/
          if-no-files-found: error
          retention-days: 7
  php:
    name: PHP — WordPress smoke + Laravel PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2
      - name: WordPress plugin — CLI smoke test
        run: php packages/middleware-wordpress/test/plugin-test.php
      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: packages/middleware-laravel/vendor
          key: composer-${{ hashFiles('packages/middleware-laravel/composer.json') }}
          restore-keys: |
            composer-
      - name: Laravel package — composer install
        working-directory: packages/middleware-laravel
        run: composer install --no-progress --no-interaction --prefer-dist
      - name: Laravel package — PHPUnit
        working-directory: packages/middleware-laravel
        run: vendor/bin/phpunit --colors=always
