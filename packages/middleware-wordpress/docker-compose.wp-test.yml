# Optional local WordPress environment for testing the ReverseShield plugin.
#
# Usage from the repo root:
#   docker compose -f packages/middleware-wordpress/docker-compose.wp-test.yml up -d
#
# Then browse to http://localhost:8080, run the WordPress install wizard, add
# the two ReverseShield constants to wp-config.php (WP admin > wp-config.php
# volume mount below), and activate the plugin.
#
# The plugin directory is bind-mounted read-only — edits on the host are
# picked up immediately without rebuilding the container.
#
# Assumes the reporting API is running on the host at http://localhost:3001.
# `host.docker.internal` resolves to the host on Docker Desktop for Windows
# and Mac. On native Linux Docker, add:
#   extra_hosts:
#     - "host.docker.internal:host-gateway"
# (already included below).

services:
  wp:
    image: wordpress:6-php8.3-apache
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppass
      WORDPRESS_DB_NAME: wpdb
      # Injects the ReverseShield config directly into the generated wp-config.php.
      # Replace REPLACE_WITH_YOUR_SITE_ID with the UUID you get from registering
      # a site in the ReverseShield dashboard.
      WORDPRESS_CONFIG_EXTRA: |
        define('REVERSESHIELD_SITE_ID', 'REPLACE_WITH_YOUR_SITE_ID');
        define('REVERSESHIELD_ENDPOINT', 'http://host.docker.internal:3001');
    volumes:
      # Persist WP core files + uploads across container restarts.
      - wp_data:/var/www/html
      # Live-mount the plugin. Edit files on the host and refresh — no rebuild.
      - ./:/var/www/html/wp-content/plugins/reverseshield:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: wpdb
      MARIADB_USER: wpuser
      MARIADB_PASSWORD: wppass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  wp_data:
  db_data:
