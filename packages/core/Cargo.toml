[package]
name = "reverseshield-core"
version = "0.1.0"
edition = "2021"
description = "ReverseShield core detection engine — rule evaluation and trust scoring."
license = "MIT"
publish = false

[lib]
name = "reverseshield_core"
# `cdylib` is required for the eventual wasm32 build and any C-ABI FFI (PHP bindings, Phase 2 step 4).
# `rlib` is kept so Rust integration tests and downstream Rust consumers can link normally.
crate-type = ["cdylib", "rlib"]

# --- Features ---------------------------------------------------------------------------
#
# `native` gates everything that requires host-OS capabilities: YAML parsing (drags in
# `serde_yaml` + `unsafe-libyaml`, ~50 KB gzipped once compiled to WASM), filesystem
# access, and hot-reload mtime tracking. WASM builds pass `--no-default-features` to
# shed all of that — the browser receives pre-parsed rules as JSON over the wire, which
# `serde_json` (still a required dep) handles in a fraction of the code footprint.
#
# The `native` feature is on by default, so `cargo build` and `cargo test` from the
# workspace root keep behaving exactly as they do today. Only the WASM build opts out.
[features]
default = ["native"]
native = ["dep:serde_yaml"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = { version = "0.9", optional = true }
thiserror = "1.0"

# wasm-bindgen is only compiled for the wasm32 target. Native `cargo build` / `cargo test`
# never pull it in — this avoids dragging JS-glue crates into PHP/native FFI consumers,
# and keeps the native build lean. The `=0.2.100` pin is not caret-relaxed: `wasm-bindgen`
# and `wasm-bindgen-cli` (invoked by build-wasm.sh) must be exact matches or the CLI
# refuses with a version-mismatch error. Bump both together, never one alone.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "=0.2.100"

[dev-dependencies]
tempfile = "3"

# --- Release profile --------------------------------------------------------------------
#
# NOTE: `[profile.release]` for this workspace lives in the *workspace root* Cargo.toml.
# Cargo intentionally ignores `[profile.*]` sections in workspace members, and warns
# about it if you write them here — so the actual release-profile knobs (opt-level = "z",
# LTO, single codegen unit, panic = abort, strip) are set at the root. Documenting the
# reason here so a future edit doesn't accidentally revive them in this file.

[package.metadata.reverseshield]
# Rules file consumed by this crate. Kept in metadata rather than a build.rs constant so
# host applications (reporting service, middlewares) can override the path per deployment.
default_rules_path = "../../rules/core-rules.yaml"
